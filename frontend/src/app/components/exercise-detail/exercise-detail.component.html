<div class="detail-container">

  <!-- Loading -->
  @if (isLoading()) {
    <div class="not-found"><p>Aufgabe wird geladen...</p></div>
  }

  <!-- Not Found -->
  @if (!isLoading() && notFound()) {
    <div class="not-found">
      <p>Übung nicht gefunden.</p>
      <a routerLink="/exercises" class="back-btn">← Zurück zur Übersicht</a>
    </div>
  }

  @if (!isLoading() && task(); as t) {

    <!-- Header -->
    <div class="page-header">
      <button class="back-btn" (click)="goBack()" type="button">← Zurück</button>
    </div>

    <!-- Hero -->
    <div class="hero-card">
      <div class="hero-top">
        <h1>{{ t.title }}</h1>
        @if (t.description) {
          <p class="goal-text">{{ t.description }}</p>
        }
      </div>

      <div class="tools-row">
        <span class="tools-label">Punkte:</span>
        <span class="tool-chip">{{ t.points }}</span>
      </div>

      <div class="button-row">
        <button class="start-btn" (click)="startLiveEnv()" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Live-Umgebung starten
        </button>
        <button class="start-btn quiz-btn" (click)="startQuiz()" type="button">
          Quiz starten
        </button>
      </div>
    </div>

  }
</div>
