<div class="exercise-container">
  <div class="header">
    <button class="back-button" (click)="goBack()" type="button">← Zurück</button>
    <h1>Übungsaufgaben</h1>
  </div>

  @if (isLoading()) {
    <div class="loading">Aufgaben werden geladen...</div>
  }

  <div class="exercise-list">
    @for (task of tasks(); track task.id) {
      <div class="exercise-card"
           [routerLink]="['/exercises', task.id]"
           role="link"
           tabindex="0"
           (keydown.enter)="navigateTo(task.id)">

        <div class="exercise-content">
          <h2>{{ task.title }}</h2>
          @if (task.description) {
            <p class="description">{{ task.description }}</p>
          }

          <div class="meta-row">
            <span class="status-badge">{{ task.points }} Punkte</span>
          </div>
        </div>

        <div class="exercise-actions" (click)="$event.stopPropagation()">
          <button type="button" class="quiz-start-btn" (click)="startQuiz(task.id)">
            Quiz starten
          </button>
        </div>

        <svg class="card-arrow" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8.59 16.34l4.58-4.59-4.58-4.59L10 5.75l6 6-6 6z"/>
        </svg>
      </div>
    }
  </div>
</div>
