<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>ITSI Container</h1>
      <p class="subtitle">TGM – Die Schule der Technik</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          required
          placeholder="lehrer@gmail.com"
        />
      </div>

      <div class="form-group">
        <label for="password">Passwort</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          required
          placeholder="Passwort eingeben"
        />
      </div>

      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="login-button">
        Anmelden
      </button>
    </form>

    <div class="login-hint">
      <p><strong>Demo:</strong> lehrer@gmail.com&nbsp;/&nbsp;schüler@gmail.com</p>
      <p>Passwort: <code>test</code></p>
    </div>
  </div>
</div>
