<div class="dashboard-container">
  <div class="header">
    <div class="header-content">
      <div>
        <h1>ITSI Labor Dashboard</h1>
        <p class="role-hint">
          @if (role() === 'teacher') {
            <span>Angemeldet als: Lehrer</span>
          } @else if (role() === 'student') {
            <span>Angemeldet als: Schüler</span>
          }
        </p>
      </div>
    </div>
    <div class="header-actions">
      <button
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.theme() === 'light' ? 'Dark Mode' : 'Light Mode'"
        type="button">
        @if (themeService.theme() === 'light') {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        }
      </button>
      <button class="logout-button" (click)="logout()">
        Abmelden
      </button>
    </div>
  </div>

  <!-- Kurse & Aufgaben Sektion -->
  <div class="courses-section">
    <h2>Meine Kurse</h2>

    <a routerLink="/exercises" class="nav-button">
      <div>
        <h3>Übungsaufgaben</h3>
        <p>Alle Aufgaben anzeigen und Fortschritt verwalten</p>
      </div>
      <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8.59 16.34l4.58-4.59-4.58-4.59L10 5.75l6 6-6 6z"/>
      </svg>
    </a>

    <a routerLink="/image/1" class="nav-button">
      <div>
        <h3>Live-Umgebung starten</h3>
        <p>Kali Linux Container mit VNC &amp; Übungsleiste öffnen</p>
      </div>
      <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8.59 16.34l4.58-4.59-4.58-4.59L10 5.75l6 6-6 6z"/>
      </svg>
    </a>
  </div>
</div>
