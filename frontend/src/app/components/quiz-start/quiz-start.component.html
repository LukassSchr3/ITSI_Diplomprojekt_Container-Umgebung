<div class="quiz-start-container">
  <div class="quiz-start-card">
    @if (quiz) {
      <div class="quiz-header">
        <h1>{{ quiz.title }}</h1>
        <p class="quiz-description">
          Gib das Passwort ein, um mit dem Quiz zu beginnen
        </p>
      </div>

      <div class="quiz-info">
        <div class="info-item">
          <span>{{ quiz.questions.length }} Fragen</span>
        </div>
      </div>

      <form class="password-form" (ngSubmit)="startQuiz()">
        <div class="form-group">
          <label for="password">Quiz-Passwort</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Passwort eingeben"
            [disabled]="isLoading"
            required
          />
        </div>

        @if (errorMessage) {
          <div class="error-message">
            {{ errorMessage }}
          </div>
        }

        <div class="button-group">
          <button type="button" class="back-button" (click)="goBack()">
            Zurück
          </button>
          <button
            type="submit"
            class="start-button"
            [disabled]="!password || isLoading">
            @if (isLoading) {
              <span>Überprüfe...</span>
            } @else {
              <span>Quiz starten</span>
            }
          </button>
        </div>
      </form>
    } @else {
      <div class="error-state">
        <p class="error-message">{{ errorMessage || 'Quiz konnte nicht geladen werden' }}</p>
        <button class="back-button" (click)="goBack()">
          Zurück zu den Übungen
        </button>
      </div>
    }
  </div>
</div>
