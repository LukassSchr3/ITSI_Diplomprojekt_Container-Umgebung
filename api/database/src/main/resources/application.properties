spring.application.name=database

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/itsi_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=itsi_user
spring.datasource.password=itsi_password
# Daten sind bereits in der Datenbank; keine Initialisierung durch Spring
spring.sql.init.mode=never

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=5050

# (spring.sql.init.platform entfernt - nicht ben�tigt, DB ist bereits vorbereitet)

# Swagger UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET:c29tZS1yYW5kb20tc2VjcmV0LWtleS1mb3Itand0LWdlbmVyYXRpb24tdGhhdC1pcy1sb25nLWVub3VnaA==}
