version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: itsi-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: itsi_db
      POSTGRES_USER: itsi_user
      POSTGRES_PASSWORD: itsi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsi_user -d itsi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: itsi-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
