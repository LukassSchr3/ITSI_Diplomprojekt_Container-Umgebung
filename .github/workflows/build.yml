name: Build and Test ITSI Project

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-database:
    name: Setup and Test Database
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Start PostgreSQL Database
      working-directory: ./api/database
      run: docker compose up -d
      
    - name: Wait for PostgreSQL to be ready
      run: |
        timeout 60 bash -c 'until docker exec itsi-postgres-db pg_isready -U itsi_user -d itsi_db; do sleep 2; done'
      
    - name: Verify database initialization
      run: |
        echo "Checking database tables..."
        docker exec itsi-postgres-db psql -U itsi_user -d itsi_db -c "\dt"
        echo "Checking users table..."
        docker exec itsi-postgres-db psql -U itsi_user -d itsi_db -c "SELECT COUNT(*) FROM users;"
        echo "Checking questions table..."
        docker exec itsi-postgres-db psql -U itsi_user -d itsi_db -c "SELECT COUNT(*) FROM questions;"
      
    - name: Test Adminer availability
      run: |
        timeout 30 bash -c 'until curl -f http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'
        echo "Adminer is running on port 8080"
      
    - name: Stop Database
      if: always()
      working-directory: ./api/database
      run: docker compose down -v

  build-backend:
    name: Build Backend (Go)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: backend/go.sum
        
    - name: Install dependencies
      working-directory: ./backend
      run: go mod download
      
    - name: Build backend
      working-directory: ./backend
      run: go build -v -o backend ./main.go
      
    - name: Upload backend binary
      uses: actions/upload-artifact@v4
      with:
        name: backend-binary
        path: backend/backend
        retention-days: 7

  build-api:
    name: Build Database API (Spring Boot)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      working-directory: ./api/database
      run: chmod +x gradlew
      
    - name: Build with Gradle
      working-directory: ./api/database
      run: ./gradlew build -x test --no-daemon
      
    - name: Upload Database API JAR
      uses: actions/upload-artifact@v4
      with:
        name: database-api-jar
        path: api/database/build/libs/*.jar
        retention-days: 7

  test-database-api:
    name: Unit Tests Database API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      working-directory: ./api/database
      run: chmod +x gradlew

    - name: Run unit tests with coverage
      working-directory: ./api/database
      run: ./gradlew test jacocoTestReport --no-daemon

    - name: Generate coverage comment
      working-directory: ./api/database
      run: |
        python3 "$GITHUB_WORKSPACE/.github/scripts/parse_jacoco_coverage.py" \
          "build/reports/jacoco/test/jacocoTestReport.xml" \
          "Database API" \
          "/tmp/database-api-coverage.md"
        cat /tmp/database-api-coverage.md >> "$GITHUB_STEP_SUMMARY"

    - name: Post coverage comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        header: database-api-coverage
        path: /tmp/database-api-coverage.md

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: database-api-test-reports
        path: |
          api/database/build/reports/tests/test/
          api/database/build/test-results/test/
          api/database/build/reports/jacoco/
        retention-days: 7

  build-steuerung-api:
    name: Build Steuerung API (Spring Boot)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      working-directory: ./api/steuerung
      run: chmod +x gradlew
      
    - name: Build with Gradle
      working-directory: ./api/steuerung
      run: ./gradlew build -x test --no-daemon
      
    - name: Upload Steuerung API JAR
      uses: actions/upload-artifact@v4
      with:
        name: steuerung-api-jar
        path: api/steuerung/build/libs/*.jar
        retention-days: 7

  test-steuerung-api:
    name: Unit Tests Steuerung API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      working-directory: ./api/steuerung
      run: chmod +x gradlew

    - name: Run unit tests with coverage
      working-directory: ./api/steuerung
      run: ./gradlew test jacocoTestReport --no-daemon

    - name: Generate coverage comment
      working-directory: ./api/steuerung
      run: |
        python3 "$GITHUB_WORKSPACE/.github/scripts/parse_jacoco_coverage.py" \
          "build/reports/jacoco/test/jacocoTestReport.xml" \
          "Steuerung API" \
          "/tmp/steuerung-api-coverage.md"
        cat /tmp/steuerung-api-coverage.md >> "$GITHUB_STEP_SUMMARY"

    - name: Post coverage comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        header: steuerung-api-coverage
        path: /tmp/steuerung-api-coverage.md

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: steuerung-api-test-reports
        path: |
          api/steuerung/build/reports/tests/test/
          api/steuerung/build/test-results/test/
          api/steuerung/build/reports/jacoco/
        retention-days: 7

  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Upload frontend dist
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 7

  test-frontend:
    name: Unit Tests Frontend (Angular/Vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Patch Angular coverage provider to Istanbul
      working-directory: ./frontend
      run: |
        node -e "
        const fs = require('fs');
        const p = 'node_modules/@angular/build/src/builders/unit-test/runners/vitest/plugins.js';
        let c = fs.readFileSync(p, 'utf8');
        if (!c.includes(\"provider: 'istanbul'\")) {
          c = c.replace(
            'enabled: coverage.enabled,\n        excludeAfterRemap:',
            \"enabled: coverage.enabled,\n        provider: 'istanbul',\n        excludeAfterRemap:\"
          );
          fs.writeFileSync(p, c);
          console.log('Istanbul patch applied.');
        } else {
          console.log('Istanbul patch already present.');
        }
        "

    - name: Run unit tests with coverage
      working-directory: ./frontend
      run: npm test -- --watch=false --coverage
      env:
        CI: true

    - name: Find coverage file
      run: find frontend -name "coverage-summary.json" 2>/dev/null || echo "coverage-summary.json not found"

    - name: Generate coverage comment
      run: |
        python3 - <<'EOF'
        import json, os, glob

        # Search for coverage-summary.json anywhere under frontend/
        candidates = glob.glob("frontend/**/coverage-summary.json", recursive=True)
        summary_path = candidates[0] if candidates else None

        if not summary_path or not os.path.exists(summary_path):
            with open("/tmp/frontend-coverage.md", "w") as f:
                f.write("## 📊 Frontend – Coverage Report\n\n> No coverage data available.\n")
            exit(0)

        with open(summary_path, "r") as f:
            data = json.load(f)

        t = data.get("total", {})
        lines = ["## 📊 Frontend – Coverage Report\n"]
        lines.append("| Metric | Covered | Total | Coverage |")
        lines.append("|--------|--------:|------:|---------:|")
        for metric in ["lines", "statements", "functions", "branches"]:
            if metric in t:
                m = t[metric]
                lines.append(f"| {metric.capitalize()} | {m['covered']} | {m['total']} | {m['pct']}% |")

        with open("/tmp/frontend-coverage.md", "w") as f:
            f.write("\n".join(lines) + "\n")
        EOF
        cat /tmp/frontend-coverage.md >> "$GITHUB_STEP_SUMMARY"

    - name: Post coverage comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        header: frontend-coverage
        path: /tmp/frontend-coverage.md

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-test-results
        path: |
          frontend/test-results/
          frontend/coverage/
        retention-days: 7
        if-no-files-found: ignore

  test-backend:
    name: Unit Tests Backend (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: backend/go.sum

    - name: Install dependencies
      working-directory: ./backend
      run: go mod download

    - name: Run unit tests with coverage
      working-directory: ./backend
      run: |
        go test ./utils/... ./routes/... ./services/... \
          -coverprofile=coverage.out \
          -covermode=atomic \
          -coverpkg=./utils/...,./routes/...,./services/...

    - name: Show coverage summary
      working-directory: ./backend
      run: go tool cover -func=coverage.out

    - name: Generate coverage comment
      working-directory: ./backend
      run: |
        go tool cover -func=coverage.out > coverage-func.txt
        python3 - <<'EOF'
        import re

        with open("coverage-func.txt", "r") as f:
            lines = f.readlines()

        rows = []
        total_line = ""
        for line in lines:
            parts = line.split()
            if len(parts) >= 3:
                if parts[0] == "total:":
                    total_line = parts[-1]
                else:
                    func_path = parts[0]
                    func_name = parts[1]
                    coverage = parts[2]
                    # shorten path for readability
                    short_path = re.sub(r'^.*/', '', func_path.split(":")[0])
                    lineno = func_path.split(":")[-1] if ":" in func_path else ""
                    rows.append(f"| `{short_path}:{lineno}` | `{func_name}` | {coverage} |")

        out = ["## 📊 Backend (Go) – Coverage Report\n"]
        if total_line:
            out.append(f"**Total coverage: {total_line}**\n")
        out.append("| File | Function | Coverage |")
        out.append("|------|----------|:--------:|")
        out.extend(rows)

        with open("/tmp/backend-coverage.md", "w") as f:
            f.write("\n".join(out) + "\n")
        EOF
        cat /tmp/backend-coverage.md >> "$GITHUB_STEP_SUMMARY"

    - name: Post coverage comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        header: backend-coverage
        path: /tmp/backend-coverage.md

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: |
          backend/test-results/
          backend/coverage.out
        retention-days: 7
        if-no-files-found: ignore

  integration-test:
    name: Integration Test (All Components)
    runs-on: ubuntu-latest
    needs: [build-database, build-backend, build-api, test-database-api, build-steuerung-api, test-steuerung-api, build-frontend, test-frontend, test-backend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Start Database
      working-directory: ./api/database
      run: docker compose up -d
      
    - name: Wait for Database
      run: |
        timeout 60 bash -c 'until docker exec itsi-postgres-db pg_isready -U itsi_user -d itsi_db; do sleep 2; done'
      
    - name: Download Database API artifact
      uses: actions/download-artifact@v4
      with:
        name: database-api-jar
        path: database-api-jar/
      
    - name: Download Steuerung API artifact
      uses: actions/download-artifact@v4
      with:
        name: steuerung-api-jar
        path: steuerung-api-jar/
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        
    - name: Start Database API Server
      run: |
        cd database-api-jar
        java -jar *.jar &
        echo $! > api.pid
        
    - name: Wait for Database API
      run: |
        timeout 90 bash -c 'until curl -s http://localhost:8080/api/users > /dev/null 2>&1; do sleep 3; done' || true
        sleep 5
      
    - name: Test Database API Endpoints
      run: |
        echo "Testing Users endpoint..."
        curl -f http://localhost:8080/api/users || echo "Users endpoint test"
        
        echo "Testing Images endpoint..."
        curl -f http://localhost:8080/api/images || echo "Images endpoint test"
        
        echo "Testing Questions endpoint..."
        curl -f http://localhost:8080/api/questions || echo "Questions endpoint test"
        
        echo "Testing Question Results endpoint..."
        curl -f http://localhost:8080/api/question-results || echo "Question Results endpoint test"
      
    - name: Cleanup
      if: always()
      run: |
        if [ -f database-api-jar/api.pid ]; then
          kill $(cat database-api-jar/api.pid) || true
        fi
        cd api/database && docker compose down -v
