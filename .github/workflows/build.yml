name: Build and Test ITSI Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-database:
    name: Setup and Test Database
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Start PostgreSQL Database
      working-directory: ./api/database
      run: docker compose up -d
      
    - name: Wait for PostgreSQL to be ready
      run: |
        timeout 60 bash -c 'until docker exec itsi-postgres-db pg_isready -U itsi_user -d itsi_db; do sleep 2; done'
      
    - name: Verify database initialization
      run: |
        echo "Checking database tables..."
        docker exec itsi-postgres-db psql -U itsi_user -d itsi_db -c "\dt"
        echo "Checking users table..."
        docker exec itsi-postgres-db psql -U itsi_user -d itsi_db -c "SELECT COUNT(*) FROM users;"
        echo "Checking questions table..."
        docker exec itsi-postgres-db psql -U itsi_user -d itsi_db -c "SELECT COUNT(*) FROM questions;"
      
    - name: Test Adminer availability
      run: |
        timeout 30 bash -c 'until curl -f http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'
        echo "Adminer is running on port 8080"
      
    - name: Stop Database
      if: always()
      working-directory: ./api/database
      run: docker compose down -v

  build-backend:
    name: Build Backend (Go)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: backend/go.sum
        
    - name: Install dependencies
      working-directory: ./backend
      run: go mod download
      
    - name: Build backend
      working-directory: ./backend
      run: go build -v -o backend ./main.go
      
    - name: Upload backend binary
      uses: actions/upload-artifact@v4
      with:
        name: backend-binary
        path: backend/backend
        retention-days: 7

  build-api:
    name: Build Database API (Spring Boot)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      working-directory: ./api/database
      run: chmod +x gradlew
      
    - name: Build with Gradle
      working-directory: ./api/database
      run: ./gradlew build -x test --no-daemon
      
    - name: Upload Database API JAR
      uses: actions/upload-artifact@v4
      with:
        name: database-api-jar
        path: api/database/build/libs/*.jar
        retention-days: 7

  test-database-api:
    name: Unit Tests Database API
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      working-directory: ./api/database
      run: chmod +x gradlew

    - name: Run unit tests
      working-directory: ./api/database
      run: ./gradlew test --no-daemon

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: database-api-test-reports
        path: |
          api/database/build/reports/tests/test/
          api/database/build/test-results/test/
          api/database/build/reports/jacoco/
        retention-days: 7

  build-steuerung-api:
    name: Build Steuerung API (Spring Boot)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      working-directory: ./api/steuerung
      run: chmod +x gradlew
      
    - name: Build with Gradle
      working-directory: ./api/steuerung
      run: ./gradlew build -x test --no-daemon
      
    - name: Upload Steuerung API JAR
      uses: actions/upload-artifact@v4
      with:
        name: steuerung-api-jar
        path: api/steuerung/build/libs/*.jar
        retention-days: 7

  test-steuerung-api:
    name: Unit Tests Steuerung API
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      working-directory: ./api/steuerung
      run: chmod +x gradlew

    - name: Run unit tests
      working-directory: ./api/steuerung
      run: ./gradlew test --no-daemon

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: steuerung-api-test-reports
        path: |
          api/steuerung/build/reports/tests/test/
          api/steuerung/build/test-results/test/
          api/steuerung/build/reports/jacoco/
        retention-days: 7

  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Upload frontend dist
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 7

  integration-test:
    name: Integration Test (All Components)
    runs-on: ubuntu-latest
    needs: [build-database, build-backend, build-api, test-database-api, build-steuerung-api, test-steuerung-api, build-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Start Database
      working-directory: ./api/database
      run: docker compose up -d
      
    - name: Wait for Database
      run: |
        timeout 60 bash -c 'until docker exec itsi-postgres-db pg_isready -U itsi_user -d itsi_db; do sleep 2; done'
      
    - name: Download Database API artifact
      uses: actions/download-artifact@v4
      with:
        name: database-api-jar
        path: database-api-jar/
      
    - name: Download Steuerung API artifact
      uses: actions/download-artifact@v4
      with:
        name: steuerung-api-jar
        path: steuerung-api-jar/
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        
    - name: Start Database API Server
      run: |
        cd database-api-jar
        java -jar *.jar &
        echo $! > api.pid
        
    - name: Wait for Database API
      run: |
        timeout 90 bash -c 'until curl -s http://localhost:8080/api/users > /dev/null 2>&1; do sleep 3; done' || true
        sleep 5
      
    - name: Test Database API Endpoints
      run: |
        echo "Testing Users endpoint..."
        curl -f http://localhost:8080/api/users || echo "Users endpoint test"
        
        echo "Testing Images endpoint..."
        curl -f http://localhost:8080/api/images || echo "Images endpoint test"
        
        echo "Testing Questions endpoint..."
        curl -f http://localhost:8080/api/questions || echo "Questions endpoint test"
        
        echo "Testing Question Results endpoint..."
        curl -f http://localhost:8080/api/question-results || echo "Question Results endpoint test"
      
    - name: Cleanup
      if: always()
      run: |
        if [ -f database-api-jar/api.pid ]; then
          kill $(cat database-api-jar/api.pid) || true
        fi
        cd api/database && docker compose down -v
