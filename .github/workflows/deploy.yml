name: Deploy ITSI Project

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy All Components
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Build Backend
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Build Backend
      working-directory: ./backend
      run: |
        go mod download
        go build -v -o backend ./main.go
      
    # Build API
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
        
    - name: Build API
      working-directory: ./api/database
      run: ./gradlew build -x test --no-daemon
      
    # Build Frontend
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build --prod
      
    # Create Release Artifacts
    - name: Create Release Directory
      run: |
        mkdir -p release/backend
        mkdir -p release/api
        mkdir -p release/frontend
        mkdir -p release/database
        
    - name: Copy Build Artifacts
      run: |
        cp backend/backend release/backend/
        cp api/database/build/libs/*.jar release/api/
        cp -r frontend/dist/* release/frontend/
        cp -r api/database/init release/database/
        cp api/database/docker-compose.yml release/database/
      
    - name: Create deployment archive
      run: |
        cd release
        tar -czf ../itsi-release-${{ github.sha }}.tar.gz .
        cd ..
      
    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: itsi-release-${{ github.sha }}
        path: itsi-release-${{ github.sha }}.tar.gz
        retention-days: 30
      
    # Optional: Create GitHub Release on tag
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: itsi-release-${{ github.sha }}.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
